<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Album Form')}"></head>

<body>
  <header th:replace="~{fragments/layout :: header}"></header>

  <main>
    <h1 th:text="${album.id == null ? 'Create Album' : 'Edit Album'}">Album Form</h1>

    <form th:action="${album.id == null} ? @{/admin/albums} : @{/admin/albums/edit/{id}(id=${album.id})}"
      th:object="${album}" method="post">

      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <label>Title</label>
      <input th:field="*{title}">
      <div class="validation-error" th:errors="*{title}"></div>

      <label>Price</label>
      <input th:field="*{price}" type="number" step="0.01">
      <div class="validation-error" th:errors="*{price}"></div>

      <label>Album art URL</label>
      <input th:field="*{albumArtUrl}">
      <div class="validation-error" th:errors="*{albumArtUrl}"></div>

      <label>Genre</label>
      <select th:field="*{genre}">
        <option th:each="genre : ${genres}" th:value="${genre.id}" th:text="${genre.name}">
        </option>
      </select>

      <label>Artist</label>
      <select th:field="*{artist}">
        <option th:each="artist : ${artists}" th:value="${artist.id}" th:text="${artist.name}">
        </option>
      </select>

      <button type="submit">Save</button>
    </form>
  </main>
</body>

</html>
